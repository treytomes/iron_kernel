name: IronKernel Documentation

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: www

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      # Install all Python tooling
      - run: |
          pip install zensical
          pip install requests feedparser

      # Generate feeds (override working directory)
      - name: Generate dev.to feed
        run: python ../scripts/fetch_devto.py

      - name: Generate YouTube feed
        run: python ../scripts/fetch_youtube_playlist.py

      - name: Generate GitHub activity feed
        run: python ../scripts/fetch_github_activity.py
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Recent Activity page
        run: python ../scripts/update_recent_activity.py

      # Build site
      - run: zensical build --clean

      - uses: actions/upload-pages-artifact@v4
        with:
          path: www/site

      - uses: actions/deploy-pages@v4
        id: deployment